<!-- @dsCard group="Brand" viewport="700x420" name="Logo" subtitle="GM monogram · GymMate wordmark · AUTOMATE · RETAIN · GROW" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin: 0; background: var(--color-bg); padding: 18px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .cell { border-radius: var(--radius-card); overflow: hidden; border: 1px solid var(--color-border); display: flex; flex-direction: column; }
  .cell .frame { flex: 1; display: flex; align-items: center; justify-content: center; padding: 18px; min-height: 110px; }
  .cell .meta { padding: 8px 12px; background: var(--color-surface); border-top: 1px solid var(--color-border); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-tertiary); display: flex; justify-content: space-between; }
  .cell .meta b { color: var(--text-secondary); font-weight: 600; }
  .bg-dark { background: #000; }
  .bg-charcoal { background: var(--gm-charcoal); }
  .bg-red { background: var(--accent); }
  .bg-light { background: #F4F4F5; }
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 12px; }
  .tiles .frame { padding: 14px; min-height: 88px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="frame bg-dark"><img src="logo-lockup-dark.png" alt="GymMate" style="max-width: 100%; height: auto;"/></div>
      <div class="meta"><b>Primary lockup</b><span>on black</span></div>
    </div>
    <div class="cell">
      <div class="frame bg-light"><img src="logo-lockup-light.png" alt="GymMate" style="max-width: 100%; height: auto;"/></div>
      <div class="meta"><b>Lockup</b><span>on light</span></div>
    </div>
    <div class="cell">
      <div class="frame bg-red"><img src="logo-lockup-red.png" alt="GymMate" style="max-width: 100%; height: auto;"/></div>
      <div class="meta"><b>Lockup</b><span>on red</span></div>
    </div>
  </div>
  <div class="tiles">
    <div class="cell"><div class="frame bg-charcoal"><img src="tile-black.png" alt="" style="width: 64px; height: 64px;"/></div><div class="meta"><b>Tile</b><span>black</span></div></div>
    <div class="cell"><div class="frame bg-light"><img src="tile-red.png" alt="" style="width: 64px; height: 64px;"/></div><div class="meta"><b>Tile</b><span>red</span></div></div>
    <div class="cell"><div class="frame bg-charcoal"><img src="tile-white.png" alt="" style="width: 64px; height: 64px;"/></div><div class="meta"><b>Tile</b><span>white</span></div></div>
    <div class="cell"><div class="frame bg-light"><img src="tile-dark.png" alt="" style="width: 64px; height: 64px;"/></div><div class="meta"><b>Tile</b><span>gradient</span></div></div>
  </div>
</body>
</html>
